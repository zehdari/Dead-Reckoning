name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            runner: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: Linux x86_64
            runner: ubuntu-22.04
            args: --bundles deb
          - name: Linux arm64
            runner: ubuntu-22.04-arm
            args: --bundles deb
          - name: Windows x86_64
            runner: windows-latest
            args: ''
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets || '' }}

      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - run: npm ci
        working-directory: app

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          # On a v* tag push this creates a draft GitHub Release and uploads
          # the installers; on manual runs it only builds (artifacts uploaded
          # by the step below).
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'Dead Reckoning ${{ github.ref_name }}'
          releaseBody: >
            Linux: `sudo apt install ./DeadReckoning_*.deb` ·
            macOS: open the .dmg, drag to Applications, then run
            `xattr -cr /Applications/DeadReckoning.app` (unsigned build) ·
            Windows: run the .exe installer.
          # Kept as a draft while the four platform builds upload in
          # parallel; the publish job below flips it live once all succeed.
          releaseDraft: true
          args: ${{ matrix.args }}

      - name: Upload build artifacts (manual run)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.runner }}
          path: |
            app/src-tauri/target/**/bundle/deb/*.deb
            app/src-tauri/target/**/bundle/dmg/*.dmg
            app/src-tauri/target/**/bundle/nsis/*.exe
            app/src-tauri/target/**/bundle/msi/*.msi

  publish:
    name: Publish release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit '${{ github.ref_name }}' --repo '${{ github.repository }}' --draft=false
