#
# riptide_mapping configuration file.
#


# BOTH-ROBOTS SETTTINGS
/**/riptide_mapping2:
  ros__parameters:
    # Covariance filter parameters
    cov_limit: 0.01 # Minimum value for the covariance matrix elements
    k_value: 0.1 # Covariance step size (< 1.0) applied per detection
    detection_cov_factor: 7.0

    # relative position filter parameters
    angle_cutoff: 15.0
    distance_limit: 10.0
    confidence_cutoff: 0.2

    # location tracking settings NOTE: buffer size is a per-robot setting.
    
    quantile: [0.01, 0.99]
    minimum_distance: 1.0

    # Cursed ah bin geometry fit thresholds
    bin_fit:
      residual_tol_m: 0.10  # max reprojection error of the two vinyls to accept a fit
      baseline_tol_m: 0.10  # |measured baseline - model baseline| for a bad detection or incorrect vinyl map
      min_baseline_m: 0.20  # model xy baseline floor, if the CAD geometry is wrong this will catch it (CAD min is ~0.52m)
      cov_floor_m2: 0.0025  # published bin position variance floor (~0.05m std)
      z_consistency_tol_m: 0.10  # if the two targets bin z disagree by more than this, use config z

